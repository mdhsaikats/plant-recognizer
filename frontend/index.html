<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Verification System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#f0fdf4",
                100: "#dcfce7",
                500: "#22c55e",
                600: "#16a34a",
                700: "#15803d",
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Smooth transitions for UI elements */
      .fade-in {
        animation: fadeIn 0.4s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .pulse-border {
        animation: pulseBorder 2s infinite;
      }
      @keyframes pulseBorder {
        0% {
          border-color: #22c55e;
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          border-color: #86efac;
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          border-color: #22c55e;
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }
    </style>
  </head>
  <body
    class="bg-brand-50 min-h-screen text-slate-800 font-sans selection:bg-brand-500 selection:text-white flex flex-col"
  >
    <!-- Navbar -->
    <nav
      class="bg-white border-b border-brand-100 shadow-sm px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-2">
        <div class="bg-brand-500 p-2 rounded-lg text-white">
          <i data-lucide="shield-check" class="w-6 h-6"></i>
        </div>
        <span class="text-xl font-bold tracking-tight text-slate-900"
          >Verifi<span class="text-brand-600">AI</span></span
        >
      </div>
      <div class="text-sm font-medium text-slate-500">
        System Status:
        <span class="text-brand-600 flex items-center inline-flex gap-1"
          ><span class="relative flex h-2 w-2"
            ><span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-500 opacity-75"
            ></span
            ><span
              class="relative inline-flex rounded-full h-2 w-2 bg-brand-600"
            ></span
          ></span>
          Online</span
        >
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
      <div
        class="bg-white w-full max-w-xl rounded-2xl shadow-xl shadow-brand-100/50 border border-slate-100 p-8"
      >
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-slate-900 mb-2">
            Plant Verification
          </h1>
          <p class="text-slate-500 text-sm">
            Upload an image to check if its a Illegal Plant or not using trained
            AI.
          </p>
        </div>

        <!-- Upload Area -->
        <div
          id="upload-zone"
          class="relative border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-brand-50 hover:border-brand-500 transition-all duration-200 cursor-pointer group mb-6 overflow-hidden min-h-[240px] flex items-center justify-center"
        >
          <input
            type="file"
            id="file-input"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
            accept="image/*"
          />

          <!-- Initial State -->
          <div id="upload-prompt" class="text-center p-6 pointer-events-none">
            <div
              class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm group-hover:scale-110 group-hover:text-brand-600 transition-transform text-slate-400"
            >
              <i data-lucide="image-plus" class="w-8 h-8"></i>
            </div>
            <p class="font-medium text-slate-700 mb-1">
              Click or drag image here
            </p>
            <p class="text-xs text-slate-500">
              Supports JPG, PNG, WEBP (Max 5MB)
            </p>
          </div>

          <!-- Preview State (Hidden initially) -->
          <div
            id="preview-container"
            class="hidden absolute inset-0 w-full h-full z-0"
          >
            <img
              id="image-preview"
              src=""
              alt="Preview"
              class="w-full h-full object-cover opacity-60"
            />
            <div
              class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent flex flex-col justify-end p-4"
            >
              <div class="flex items-center justify-between text-white">
                <span
                  id="file-name"
                  class="text-sm font-medium truncate max-w-[80%]"
                  >filename.jpg</span
                >
                <button
                  type="button"
                  id="remove-btn"
                  class="text-white hover:text-red-400 z-20 cursor-pointer"
                >
                  <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Button -->
        <button
          id="verify-btn"
          disabled
          class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none"
        >
          <i data-lucide="scan" class="w-5 h-5"></i>
          <span>Verify Image Content</span>
        </button>

        <!-- Loading State -->
        <div
          id="loading-state"
          class="hidden mt-6 flex-col items-center justify-center py-4 fade-in"
        >
          <i
            data-lucide="loader-2"
            class="w-8 h-8 text-brand-500 animate-spin mb-3"
          ></i>
          <p class="text-sm font-medium text-slate-600">
            Analyzing image fingerprint...
          </p>
          <div
            class="w-full bg-slate-100 rounded-full h-1.5 mt-3 overflow-hidden"
          >
            <div
              class="bg-brand-500 h-1.5 rounded-full animate-[pulse_1s_ease-in-out_infinite] w-2/3"
            ></div>
          </div>
        </div>

        <!-- Result Section -->
        <div
          id="result-section"
          class="hidden mt-6 p-5 rounded-xl border fade-in"
        >
          <div class="flex items-start gap-4">
            <div
              id="result-icon-container"
              class="p-3 rounded-full flex-shrink-0"
            >
              <i id="result-icon" data-lucide="" class="w-8 h-8"></i>
            </div>
            <div>
              <h3
                class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1"
              >
                Analysis Result
              </h3>
              <div class="flex items-center gap-2 mb-2">
                <span id="result-title" class="text-2xl font-bold"></span>
                <span
                  id="confidence-badge"
                  class="text-xs px-2 py-1 rounded-md font-semibold bg-white/50 border"
                ></span>
              </div>
              <p id="result-desc" class="text-sm"></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-slate-400 text-sm">
      <p>&copy; 2026 VerifiAI Systems. Secure & Encrypted.</p>
    </footer>

    <script>
      // Initialize Icons
      lucide.createIcons();

      // DOM Elements
      const fileInput = document.getElementById("file-input");
      const uploadZone = document.getElementById("upload-zone");
      const uploadPrompt = document.getElementById("upload-prompt");
      const previewContainer = document.getElementById("preview-container");
      const imagePreview = document.getElementById("image-preview");
      const fileNameDisplay = document.getElementById("file-name");
      const removeBtn = document.getElementById("remove-btn");
      const verifyBtn = document.getElementById("verify-btn");
      const loadingState = document.getElementById("loading-state");
      const resultSection = document.getElementById("result-section");

      // Result Elements
      const resultIconContainer = document.getElementById(
        "result-icon-container",
      );
      const resultIcon = document.getElementById("result-icon");
      const resultTitle = document.getElementById("result-title");
      const resultDesc = document.getElementById("result-desc");
      const confidenceBadge = document.getElementById("confidence-badge");

      let currentFile = null;

      // Handle Drag & Drop styling
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        uploadZone.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((eventName) => {
        uploadZone.addEventListener(eventName, () => {
          uploadZone.classList.add("border-brand-500", "bg-brand-50");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        uploadZone.addEventListener(eventName, () => {
          uploadZone.classList.remove("border-brand-500", "bg-brand-50");
        });
      });

      // Handle file selection
      fileInput.addEventListener("change", function (e) {
        handleFiles(this.files);
      });

      uploadZone.addEventListener("drop", function (e) {
        let dt = e.dataTransfer;
        let files = dt.files;
        fileInput.files = files; // Sync input
        handleFiles(files);
      });

      function handleFiles(files) {
        if (files.length === 0) return;

        const file = files[0];
        if (!file.type.startsWith("image/")) {
          alert("Please upload an image file.");
          return;
        }

        currentFile = file;
        fileNameDisplay.textContent = file.name;

        const reader = new FileReader();
        reader.onload = function (e) {
          imagePreview.src = e.target.result;
          showPreview(true);
        };
        reader.readAsDataURL(file);
      }

      function showPreview(show) {
        if (show) {
          uploadPrompt.classList.add("hidden");
          previewContainer.classList.remove("hidden");
          verifyBtn.disabled = false;
          // Reset result
          resultSection.classList.add("hidden");
        } else {
          uploadPrompt.classList.remove("hidden");
          previewContainer.classList.add("hidden");
          verifyBtn.disabled = true;
          fileInput.value = "";
          currentFile = null;
          resultSection.classList.add("hidden");
        }
      }

      // Remove image
      removeBtn.addEventListener("click", (e) => {
        e.preventDefault(); // Stop clicking input
        e.stopPropagation(); // Stop bubbling
        showPreview(false);
      });

      // Verification Logic
      verifyBtn.addEventListener("click", () => {
        if (!currentFile) return;

        // UI State change
        verifyBtn.disabled = true;
        verifyBtn.innerHTML =
          '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processing...';
        lucide.createIcons();

        resultSection.classList.add("hidden");
        loadingState.classList.remove("hidden");
        uploadZone.classList.add("opacity-50", "pointer-events-none");

        // Simulate API Call / Processing time
        setTimeout(() => {
          processResult();
        }, 2500); // 2.5 seconds wait
      });

      function processResult() {
        // Restore UI
        verifyBtn.innerHTML =
          '<i data-lucide="scan" class="w-5 h-5"></i><span>Verify Image Content</span>';
        verifyBtn.disabled = false;
        lucide.createIcons();
        loadingState.classList.add("hidden");
        uploadZone.classList.remove("opacity-50", "pointer-events-none");
        resultSection.classList.remove("hidden");

        // Simulate random result for demo purposes
        // In a real app, this would use the response from a backend
        const isLegit = Math.random() > 0.5;
        const confidence = Math.floor(Math.random() * (99 - 85 + 1) + 85); // 85-99%

        // Reset classes
        resultSection.className = "mt-6 p-5 rounded-xl border fade-in";
        resultIconContainer.className = "p-3 rounded-full flex-shrink-0";

        if (isLegit) {
          // Legit Styling
          resultSection.classList.add("bg-brand-50", "border-brand-200");
          resultIconContainer.classList.add("bg-brand-100", "text-brand-600");

          // Update Icon
          resultIcon.setAttribute("data-lucide", "check-circle");

          // Text updates
          resultTitle.textContent = "Legit";
          resultTitle.classList.remove("text-red-600");
          resultTitle.classList.add("text-brand-700");

          confidenceBadge.textContent = `${confidence}% Confidence`;
          confidenceBadge.classList.add("text-brand-700", "border-brand-200");
          confidenceBadge.classList.remove("text-red-700", "border-red-200");

          resultDesc.textContent =
            "This image has passed all security checks and contains no prohibited or manipulated content.";
          resultDesc.classList.remove("text-red-600/80");
          resultDesc.classList.add("text-brand-700/80");
        } else {
          // Illegal Styling
          resultSection.classList.add("bg-red-50", "border-red-200");
          resultIconContainer.classList.add("bg-red-100", "text-red-600");

          // Update Icon
          resultIcon.setAttribute("data-lucide", "alert-triangle");

          // Text updates
          resultTitle.textContent = "Illegal";
          resultTitle.classList.remove("text-brand-700");
          resultTitle.classList.add("text-red-600");

          confidenceBadge.textContent = `${confidence}% Confidence`;
          confidenceBadge.classList.add("text-red-700", "border-red-200");
          confidenceBadge.classList.remove(
            "text-brand-700",
            "border-brand-200",
          );

          resultDesc.textContent =
            "Warning: This image violates content policies or shows signs of heavy tampering/forgery.";
          resultDesc.classList.remove("text-brand-700/80");
          resultDesc.classList.add("text-red-600/80");
        }

        // Re-initialize the specific icon we just injected
        lucide.createIcons();
      }
    </script>
  </body>
</html>
